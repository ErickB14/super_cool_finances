services:
  - type: web
    name: balance-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_ENV
        value: production
      - key: AUTO_BOOTSTRAP_DB
        value: "false"
