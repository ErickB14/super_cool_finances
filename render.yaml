services:
  - type: web
    name: balance-api
    runtime: python
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_ENV
        value: production
      - key: AUTO_BOOTSTRAP_DB
        value: "false"
